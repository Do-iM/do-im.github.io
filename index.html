<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>CSV Base64 → Chart.js 대시보드</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 16px;
      background-color: #f5f5f5;
      color: #222;
    }

    h1 {
      font-size: 20px;
      margin-bottom: 12px;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
      background: #fff;
      border-radius: 8px;
      padding: 16px 20px 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px 24px;
      align-items: center;
      margin-bottom: 12px;
    }

    .controls-group {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
    }

    .controls input[type="date"] {
      padding: 4px 6px;
      font-size: 14px;
    }

    #seriesControls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 16px;
      margin-bottom: 8px;
      font-size: 14px;
    }

    #seriesControls label {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      user-select: none;
    }

    #status {
      font-size: 13px;
      color: #666;
      margin-bottom: 6px;
    }

    canvas {
      max-width: 100%;
    }

    .error {
      color: #c0392b;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>CSV(Base64) 데이터 차트</h1>

    <div id="status">URL의 <code>?data=...</code> 파라미터에서 CSV 데이터를 불러오는 중...</div>

    <div class="controls">
      <div class="controls-group">
        <strong>날짜 범위:</strong>
        <label>
          시작
          <input type="date" id="startDate" />
        </label>
        <label>
          종료
          <input type="date" id="endDate" />
        </label>
        <button id="applyRangeBtn">적용</button>
      </div>
    </div>

    <div id="seriesControls"></div>

    <canvas id="chartCanvas" height="300"></canvas>
  </div>

  <script>
    // ----- 유틸 함수들 -----

    function parseCSV(text) {
      const lines = text.trim().split(/\r?\n/);
      const rows = [];
      for (const line of lines) {
        if (!line.trim()) continue;
        const cols = line.split(",");
        rows.push(cols.map(c => c.trim()));
      }
      return rows;
    }

    function decodeBase64Param(paramValue) {
      if (!paramValue) return null;
      try {
        // URL 인코딩 해제 후 base64 디코드
        const decodedParam = decodeURIComponent(paramValue);
        return atob(decodedParam);
      } catch (e) {
        console.error("Base64 decode error:", e);
        return null;
      }
    }

    // ----- 전역 상태 -----
    let originalLabels = [];       // 전체 날짜 (문자열 배열)
    let seriesNames = [];          // ["install","uninstall", ...]
    let originalSeriesData = [];   // 각 시리즈별 전체 데이터 배열 (2차원)
    let chart = null;
    let minDate = null;
    let maxDate = null;

    const startInput = document.getElementById("startDate");
    const endInput = document.getElementById("endDate");
    const applyRangeBtn = document.getElementById("applyRangeBtn");
    const statusEl = document.getElementById("status");
    const seriesControlsEl = document.getElementById("seriesControls");
    const ctx = document.getElementById("chartCanvas").getContext("2d");

    // ----- 데이터 로딩 & 초기화 -----

    function initFromCSV(csvText) {
      const rows = parseCSV(csvText);
      if (!rows.length) {
        statusEl.innerHTML = '<span class="error">CSV 데이터가 비어 있습니다.</span>';
        return;
      }

      const header = rows[0];
      if (header.length < 2) {
        statusEl.innerHTML = '<span class="error">CSV 형식이 올바르지 않습니다. (날짜 열 + 최소 1개의 정수 열 필요)</span>';
        return;
      }

      const dateColName = header[0];
      seriesNames = header.slice(1); // 나머지 열 이름들

      const labels = [];
      const seriesData = seriesNames.map(() => []);

      for (let i = 1; i < rows.length; i++) {
        const row = rows[i];
        if (!row[0]) continue;

        const dateStr = row[0]; // yyyy-mm-dd 형태 가정
        labels.push(dateStr);

        for (let s = 0; s < seriesNames.length; s++) {
          const valStr = row[s + 1] ?? "";
          const num = parseInt(valStr, 10);
          seriesData[s].push(Number.isFinite(num) ? num : null);
        }
      }

      if (!labels.length) {
        statusEl.innerHTML = '<span class="error">유효한 날짜 데이터가 없습니다.</span>';
        return;
      }

      originalLabels = labels;
      originalSeriesData = seriesData;
      minDate = labels[0];
      maxDate = labels[labels.length - 1];

      setupDateInputs();
      setupSeriesControls();
      createOrUpdateChart(true);

      statusEl.textContent =
        `데이터 로드 완료 (${dateColName}: ${minDate} ~ ${maxDate}, 시리즈: ${seriesNames.join(", ")})`;
    }

    function setupDateInputs() {
      startInput.min = minDate;
      startInput.max = maxDate;
      endInput.min = minDate;
      endInput.max = maxDate;

      startInput.value = minDate;
      endInput.value = maxDate;
    }

    function setupSeriesControls() {
      seriesControlsEl.innerHTML = "";

      seriesNames.forEach((name, idx) => {
        const label = document.createElement("label");
        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.checked = true;
        checkbox.dataset.index = idx;

        checkbox.addEventListener("change", () => {
          if (chart && chart.data && chart.data.datasets[idx]) {
            chart.data.datasets[idx].hidden = !checkbox.checked;
            chart.update();
          }
        });

        const span = document.createElement("span");
        span.textContent = name;

        label.appendChild(checkbox);
        label.appendChild(span);
        seriesControlsEl.appendChild(label);
      });
    }

    // ----- 필터링 & 차트 업데이트 -----

    function getFilteredData() {
      const start = startInput.value || minDate;
      const end = endInput.value || maxDate;

      const filteredLabels = [];
      const filteredSeries = seriesNames.map(() => []);

      for (let i = 0; i < originalLabels.length; i++) {
        const d = originalLabels[i];
        // yyyy-mm-dd 형식이면 문자열 비교로 범위 체크 가능
        if (d >= start && d <= end) {
          filteredLabels.push(d);
          for (let s = 0; s < seriesNames.length; s++) {
            filteredSeries[s].push(originalSeriesData[s][i]);
          }
        }
      }

      return { labels: filteredLabels, series: filteredSeries };
    }

    function createOrUpdateChart(initial = false) {
      const { labels, series } = getFilteredData();

      if (!labels.length) {
        statusEl.innerHTML = '<span class="error">선택한 날짜 범위에 데이터가 없습니다.</span>';
        return;
      }

      const colors = [
        "#3366CC", "#DC3912", "#FF9900", "#109618", "#990099",
        "#0099C6", "#DD4477", "#66AA00", "#B82E2E", "#316395"
      ];

      const datasets = seriesNames.map((name, idx) => ({
        label: name,
        data: series[idx],
        borderColor: colors[idx % colors.length],
        backgroundColor: colors[idx % colors.length],
        tension: 0.25,
        fill: false,
        pointRadius: 3,
        pointHoverRadius: 5,
      }));

      if (initial || !chart) {
        chart = new Chart(ctx, {
          type: "line",
          data: {
            labels,
            datasets
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            animation: {
              duration: 600,
              easing: "easeOutQuad"
            },
            interaction: {
              mode: "index",
              intersect: false
            },
            plugins: {
              legend: {
                display: false // 외부 체크박스로 ON/OFF
              },
              tooltip: {
                callbacks: {
                  // 날짜를 그대로 보여주고, 값은 정수로
                  label: (ctx) => {
                    const label = ctx.dataset.label || "";
                    const value = ctx.parsed.y;
                    return `${label}: ${value}`;
                  }
                }
              }
            },
            scales: {
              x: {
                title: {
                  display: true,
                  text: "날짜"
                }
              },
              y: {
                beginAtZero: true,
                title: {
                  display: true,
                  text: "값"
                }
              }
            }
          }
        });
      } else {
        chart.data.labels = labels;
        chart.data.datasets.forEach((ds, idx) => {
          ds.data = series[idx];
        });
        chart.update();
      }
    }

    // ----- 이벤트 바인딩 -----

    applyRangeBtn.addEventListener("click", () => {
      createOrUpdateChart(false);
    });

    // 날짜 입력 변경 시에도 바로 반영하고 싶다면 주석 해제
    // startInput.addEventListener("change", () => createOrUpdateChart(false));
    // endInput.addEventListener("change", () => createOrUpdateChart(false));

    // ----- 페이지 로드 시 URL 파라미터에서 데이터 읽기 -----

    (function init() {
      const params = new URLSearchParams(window.location.search);
      const dataParam = params.get("data");

      if (!dataParam) {
        statusEl.innerHTML =
          '<span class="error">URL에 <code>?data=...</code> 파라미터가 없습니다. base64 인코딩된 CSV를 data 파라미터로 전달하세요.</span>';
        return;
      }

      const csvText = decodeBase64Param(dataParam);
      if (!csvText) {
        statusEl.innerHTML =
          '<span class="error">data 파라미터를 base64 → 텍스트로 디코딩할 수 없습니다.</span>';
        return;
      }

      initFromCSV(csvText);
    })();
  </script>
</body>
</html>
